<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="styles.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Electric Cars</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">Electric</div>

    <ul class="nav-links">
      <li><a href="#">Models</a></li>
      <li><a href="#">Shop</a></li>
      <li><a href="#">Support</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-overlay"></div>

    <div class="hero-content">
      <h1>Drive the Future</h1>
      <p>Electric performance redefined</p>

      <div class="buttons">
        <button class="btn primary">Order Now</button>
        <button class="btn secondary">Learn More</button>
      </div>
    </div>
  </section>

  <!-- MODELS -->
  <section class="models">
    <h2>Our Models</h2>

    <div class="model-grid">

      <div class="card">
        <img src="assets/model-s.jpg" alt="Model S">
        <h3>Model S</h3>
      </div>

      <div class="card">
        <img src="assets/model-3.jpg" alt="Model 3">
        <h3>Model 3</h3>
      </div>

      <div class="card">
        <img src="assets/model-x.jpg" alt="Model X">
        <h3>Model X</h3>
      </div>

      <div class="card">
        <img src="assets/model-y.jpg" alt="Model Y">
        <h3>Model Y</h3>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-links">
      <a href="#">Privacy</a>
      <a href="#">Legal</a>
      <a href="#">Contact</a>
      <a href="#">Support</a>
    </div>

    <p>© 2026 Electric Cars</p>
  </footer>

</body>
</html>
